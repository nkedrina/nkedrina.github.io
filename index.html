<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#0f172a;
    color:#fff;
    min-height:100vh;
    padding:32px 16px;
}

.container{
    max-width:820px;
    margin:0 auto;
}

.profile{
    text-align:center;
    margin-bottom:32px;
}

.avatar{
    width:180px;
    height:180px;
    margin:0 auto 20px;
    border-radius:24px;
    overflow:hidden;
    border:4px solid #fff;
    box-shadow:0 12px 40px rgba(0,0,0,.3);

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;

h1{

    font-weight:800;
    margin-bottom:10px;
}

.bio{
    opacity:.9;

}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
}

.card{
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-height:160px;
    padding:24px;
    border-radius:24px;
    text-decoration:none;
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card-title{
    font-size:1.25rem;
    font-weight:700;
    margin-bottom:8px;
}

.card-subtitle{
    opacity:.9;
    font-size:.95rem;
}

.white{
    background:#fff;
    color:#111827;
}

.dark{
    background:#111827;
    color:white;
}

.blue{
    background:#2563eb;
    color:white;
}

.pink{
    background:#ec4899;
    color:white;
}

@media(max-width:640px){
    .grid{
        grid-template-columns:1fr;
    }

    .card{
        min-height:120px;
    }

    .avatar{
        width:140px;
        height:140px;
    }
}
</style>
</head>
